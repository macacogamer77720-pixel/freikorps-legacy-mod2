l_english: 
GER_la_crisis_polaca:0 "The Polish Crisis"
GER_la_crisis_polaca_desc:0 "Since the end of the Great War, the Poles have been pulling strings and occupying essential territory. For too long, we accepted this fact, timidly bowing our heads for the protection of their French lackeys. Well, no. We will show those damned Poles that they should not meddle with the German nation."
GER_poniendolos_a_prueba:0 "putting them to the test"
GER_poniendolos_a_prueba_desc:0 "The Poles have been bothering us for a long time, isn't it time someone returned the favor?"
GER_la_lucha_en_la_mesa:0 "the fight at the table"
GER_la_lucha_en_la_mesa_desc:0 "It is quite clear to all of us that this fight is not only about the rifle, but also about the negotiating table. It is vitally important that the French do not succeed in their attempt to draw the British into this conflict; otherwise, we will be forced to withdraw."
GER_activar_a_la_industria:0 "activate the industry"
GER_activar_a_la_industria_desc:0 "Our industry has been preparing for this moment, ever since the coup, although I must say it has significantly damaged our economy. Now is the time for the Prussian eagle to spread its wings."
GER_quehacerconlapoblacion:0 "what to do with the population?"
GER_quehacerconlapoblacion_desc:0 "The population has been in a rather precarious situation since the 1929 crisis and… well, almost throughout our entire administration. Although with the recent revitalization of our economy, the population's situation has generally improved, at least noticeably. Now the question remains, do we focus on industry or on having more soldiers?"
GER_escucharalostecnocratas:0 "listen to the tecnocrats?"
GER_escucharalostecnocratas_desc:0 "Lately, a segment of the population has advocated for more pragmatic policies that move away from our vengeful efforts; however, given the precarious state of our economy, listening to technocrats could be an interesting option."
GER_la_economia_es_un_juego_tramposo:0 "the economy is a triki game"
GER_la_economia_es_un_juego_tramposo_desc:0 "We tried, okay? But the situation is simply overwhelming us. The economy has been stagnant and at risk of collapse for years, and there seems to be nothing that can save it. We naively hoped that an activation against Poland might save it, but it seems that wasn't the case. For now, all we can do is pray that perhaps God will hear our pleas and that the economy can one day rise like a phoenix, but until then, all we can do is beg…"
GER_la_amargura_del_fracaso:0 "the bitterness of the faliure"
GER_la_amargura_del_fracaso_desc:0 "Although we tried, the negotiations haven't gone as planned, so now we can only hope that the status quo is maintained and that there are no major changes."
GER_unpactoconsatan:0 "a pact with Satan??"
GER_unpactoconsatan_desc:0 "The British Empire... is one of the largest and most magnificent empires that has ever existed; however, our struggle for global hegemony has always kept us in confrontational situations. Yet perhaps there is a chance that, for the first time in history, that will change; it's worth trying, even if it's just for a little while."
GER_vestirse_de_oveja:0 "dressing as a sheep"
GER_vestirse_de_oveja_desc:0 "To the British, we're still those heartless, vengeful monsters. However, the reality is that while that's partly true, it doesn't mean that's all we are or that there aren't reasons to act this way. We just need the British to see it. Who knows how far we can go?"
GER_algo_para_lo_que_no_estamos_preparados:0 "something we are not prepared for"
GER_algo_para_lo_que_no_estamos_preparados_desc:0 "Our disastrous performance in Poland made it clear that our army is not prepared for a conflict of this kind. We will have to address this later, but for now, our only option is to survive."
GER_movilizar_unidades_freikorps:0 "movilizar unidades freikorps"
GER_movilizar_unidades_freikorps_desc:0 "The Freikorps have historically been combat units that haven't been used in battles against large nations; however, this could be the exception to the rule. If we try using them for skirmishes, we might see them prove to be a significant asset."
GER_problemas_inseperados:0 "unexpected problems"
GER_problemas_inseperados_desc:0 "In one of our skirmishes, several of our officers were captured, so we had to negotiate a halt to the skirmishes in order to get them back. Although the matter fortunately wasn't made public, it does speak to the poor state of our army for a conflict of that kind."
GER_estonoestafuncionando:0 "this is not working..."
GER_estonoestafuncionando_desc:0 "Despite our efforts, things don't seem to be improving; on the contrary, they're getting worse every day. We'll have to change course if we want better results."
