l_english:
kaiser_wilhiem_ii:0 "Kaiser Wilhiem II"
kaiser_wilhiem_ii_desc:0 "To say that Kaiser Wilhelm II is no longer what he once was would be an understatement. He not only led our country to ruin due to his incompetence and the breakdown in communication between the aristocracy and the common people, but it's also undeniable that he remains a symbol of both unity and stability, at least for the officers and a certain segment of our government. Ultimately, he's not going to save our government, but at least he's better than nothing. At the end of the day, he's well aware that he has no say in matters concerning the state."
overmobilized_industry:0 "over-mobilized industry"
overmobilized_industry_desc:0 "For over a decade, the German economy has been focused on one thing, achieving revenge at any cost, regardless of the price. However, it doesn't take a genius to realize that this approach would have consequences. The economy has been under immense strain for years, resulting in what is, at best, profoundly mediocre performance. While some voices are suggesting we should try to open up and end the protests, there are still people in the government who flatly refuse to do so."
the_freikorps_question:0 "the Freikorps question"
the_freikorps_question_desc:0 "The issue of the Freikorps has been a topic of debate ever since we managed to stage the coup back in 1920. It's undeniable that the Freikorps were composed of people who cherish their country and its traditional values, so we can't simply forget them. However, maintaining the Freikorps has proven to have long-term problems. Their inherently "free" nature has given them far more freedom to do as they please, and consequently, abuses of power have been commonplace over the past decade. Not to mention that their ability to guarantee peace has been called into question since the 1929 crash, so it's clear that reform or even complete dissolution is needed, although, of course, this is something no one in the government dares to do."
the_stillfresh_memory_of_the_great_war:0 "the still-fresh memory of the great war"
the_stillfresh_memory_of_the_great_war_desc:0 "Although the Great War has ended, its memory remains with both the population and the army. The memories of the trenches still terrify some soldiers, so it's not surprising that many people are no longer so enthusiastic about going to the front. However, on the other hand, this conflict has given us true veteran killing machines that will be a perfect fit."
almost_no_international_support:0 "almost no international support"
almost_no_international_support_desc:0 "It is no surprise that almost ignoring the Treaty of Versailles would have long-term consequences. The United States and its allies wanted a liberal state that would bow its head and accept that they were the champions of the new century. Instead, they found themselves with a state as militaristic as it was vengeful. Given this scenario, it is no wonder that our position on the world stage is dire."
memoirs_of_1929:0 "Memoirs of 1929"
memoirs_of_1929_desc:0 "The 1929 crisis was almost the final nail in the coffin of our government. It demonstrated that we could not simply continue with our government in the long term and revealed its weakness. Although we managed to stop the protests, it came at a tremendous cost, largely losing the support of those who might even have sympathized with us. In response, different proposals have been put forward. The reformist wing, led by Hugenberg, says it was a mistake, while figures like Ludendorff refuse to admit it, uttering his famous phrase, "I would do it again and a thousand times if necessary." In any case, whichever faction inherits the Reich will not be able to ignore this problem."
