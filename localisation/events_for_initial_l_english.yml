events_for_initial.1.d:0 "Lüttwitz looked with disdain at the economic report for the past year. It was as mediocre as it had always been since he'd taken command back in 1922. However, things seemed to be changing in recent months. After all, the conflict with Poland had finally allowed him to mobilize and make good use of our already depleted war economy, for something practical and immediate. Although he knew this was only temporary, it was also something that could offer a glimmer of hope in the abyss that had been in the country for years. \n\nHowever, a debate remained regarding this reactivation of the economy, since the military used it as justification for mobilizing more people to the battlefield, while others spoke of taking advantage of the situation to gradually rebuild civilian industry, keeping people employed in the factories. It was a difficult decision for him. A few years ago, he wouldn't have hesitated to simply send people to war to retake the imperial possessions. However, political reality seems to have changed him more than he initially expected, so after thinking about it for a while he said to himself"
events_for_initial.1.a:0 "wee need more soldiers"
events_for_initial.1.b:0 "wee need more workers"
events_for_initial.2.t:0 "a litle aproche"
events_for_initial.2.d:0 "King Edward paused for a moment, gazing at a photograph of the former king George V, and a thought crossed his mind, did he really have to do this? He could very well be enjoying a quiet afternoon with his wife or simply indulging in his many and varied luxuries. Yet here he was, dealing with a political crisis that, honestly, he did not care about. \n(Wolfgang Kapp enters the room)\n-(Edward thought for a moment before speaking)\n"Very well, thank you for asking, and thank you for coming to the meeting,” Edward replied.\n"I would like to get straight to the point and address directly the issues concerning the Polish crisis and its implications."-\n(Edward did not quite know how to respond; his life had not prepared him for decisions of this kind, and besides, he honestly did not care much about the topic.)\n"“Uh… yes, yes, about that matter…”"-“I remind you that our nation is fully aware of how this may appear, and we assure you that the sole objective of our nation is the restoration and respect of our national pride—” (Edward interrupted him,) “Yes, yes, yes, I know, but you know, I also wanted to take the opportunity to talk about other things, you know?” (Kapp looked at him, puzzled.) “What exactly do you mean, Mr. Edward?” “Well, you see, I would like to know more about this ‘German food.’ I’ve heard wonders about it.” Kapp stared at Edward in complete disbelief. Was this the man who would soon be monarch? After some time processing this, an idea came to mind.      \n\n“Of course, Mr. Edward. We could even offer you our finest German chefs, in exchange, of course, for a little positive feedback from us.”\nEdward simply smiled."
events_for_initial.2.a:0 "seems like we have a deal"
events_for_initial.3.t:0 "the bitterness of failure"
events_for_initial.3.d:0 "The British, due to recent events, took our proposal of "brotherly reconciliation" as almost an insult, and in response, our nation has just been embargoed by the empire. This scandal will go down in the history of our government as one of the worst in all of history. God have mercy on us."
events_for_initial.3.a:0 "DAME IT!!!"
