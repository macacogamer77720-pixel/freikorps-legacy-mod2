l_english:
la_crisis_polaca.1.t:0 "The British Empire sends us an ultimatum."
la_crisis_polaca.1.d:0 "The British Empire has apparently stopped being quiet and has just sent us an ultimatum, telling us that we must immediately stop all hostility towards Poland or else France and they will invade us."
la_crisis_polaca.2.t:0 "la historia que conmovió alemanes"
la_crisis_polaca.2.d:0 "This morning a story broke about a Polish girl who described losing her parents in a border conflict with Germany. Not only that, the girl described mistreatment and humiliation of civilians in the area, the worst part being that her parents weren't even soldiers. This story has already gone viral, and it is hoped that the efforts Germany has made to improve its relations with the British will soon be undone."
la_crisis_polaca.2.a:0 "POLISH PROPAGANDA"
