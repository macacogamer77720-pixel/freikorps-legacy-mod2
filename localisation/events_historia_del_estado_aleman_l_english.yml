l_english:
historia_del_estado_aleman.1.t:0 "el estado aleman"
historia_del_estado_aleman.1.d:0 "El estado aleman es una entidad que es declarada en 1920 tras el golpe de estado hecho por wolf kapp y las unidades paramilitares “freikorps”\n"
historia_del_estado_aleman.1.a:0 "si honestamente no me interesa el lore"
historia_del_estado_aleman.1.b:0 "y como paso ese golpe de estado?"
historia_del_estado_aleman.2.t:0 "EL GOLPE DE ESTADO"
historia_del_estado_aleman.2.d:0 "la conspiración inicia con la sensación de escepticismo de la derecha hacia la república socialdemócrata, habido pasado por un intento de revolución en alemania por los llamados “espartaquistas”, siendo un intento de instaurar comunismo en la joven república, es así que el gobierno crea las unidades paramilitares conocidas como “freikorps” hechas de veteranos de la primera guerra mundial y por jóvenes anti-comunistas, estas unidades aplastaron la revuelta y matarían a los líderes rosa luxemburgo y …. Es así como estas unidades cobran un peso extremadamente importante para más tarde.\n\npara 1920 la derecha alemana todavía no se sentía ni quería estar cómodo con la idea de una democracia liberal sin mencionar claro el tratado de versalles que proponia cosas como reducir la fuerza del ejército a 100.000 cosa que claro a la derecha molesto demasiado, es por esto que organizaron un golpe de estado que no entraría en vigor hasta en el 29 de febrero de 1920, esto debido a que por las estipulaciones del tratado de versalles, el ejército se vio obligado a disolver una brigada de la marina y un cuerpo de voluntarios, debido a esto El 10 de marzo de 1920, el general Walther von Lüttwitz exigió del presidente Friedrich Ebert y del ministro de Defensa Gustav Noske que se dejará de reducir las tropas, que se disolviese el parlamento y que se eligiese el presidente directamente por el pueblo. Ebert y Noske rechazaron estas exigencias y le dieron vacaciones forzosas a von Lüttwitz. Entonces von Lüttwitz decidió llevar a cabo un golpe de Estado.\n\nel 13 de marzo Lüttwitz decidió partir con una brigada a berlín, el ejército regular se negó a combatir a los golpistas y como resultado Friedrich Ebert y Gustav se vieron forzados a huir, de manera que Wolfgang Kapp se nombró a sí mismo canciller y a von Lüttwitz ministro de Defensa y comandante en jefe del ejército es así como los funcionarios de berlín se negaron a acatar sus órdenes y llamaron a un paro general. Sin embargo debido a los comunistas todavia resentidos por los asesinatos de Rosa Luxemburgo llamaron a no hacer el paro.\n\nfue de esta manera que a pesar de que el paro fue en cierta parte efectivo los llamados del partido comunista a no hacer paros dificulto mucho su efectividad. De manera que con el pasar de los dias y dias, los paros fueran poco a poco perdiendo fuerza hasta que finalmente Wolfgang Kapp pudo finalmente cimentar su control sobre berlín y cuando el partido comunista se dio cuenta de su error fue demasiado tarde. rápidamente Wolfgang mando a banear al partido comunista y matar a todos los de este, la mayoría terminaria huyendo a hungria y después rusia y los que no terminaron masacrados por las unidades freikorps\n"
historia_del_estado_aleman.2.a:0 "interesante"
historia_del_estado_aleman.3.t:0 "EL POST GOLPE"
historia_del_estado_aleman.3.d:0 "no es de extrañar lo que pasaria despues de esto, la entente y la recién creada liga de naciones, condenaron la acción y entre ellas francia fue la que mas violenta se puso, incluso esta última dijo que se preparará para una invasión de alemania, a pesar de esto, la situación no era la misma que en 1919, la mayoría de tropas estadounidenses se habían ido del continente y la mayoría estaba pasando por una crisis post-guerra, la misma francia estaba destruida en casi todo aspecto de manera que sin apoyo estadounidense el reino unido decidió que para este punto lo mejor sería negociar con el nuevo estado, francia sin el apoyo del imperio britanico dificilmente podria tener una victoria fácil como ellos creían.\n\nsin embargo las negociaciones para ver el tratado de versalles fueron de las más tensas posibles ya que prácticamente nadie que no fuera la propia alemania, estaba contenta con negociar con un estado revanchista y militarista, sin embargo para bien o para mal se llegó a un pequeño consenso, el ejército no seria reducido a solo 100.000 si no que se podría expandir hasta 500.000 y las reparaciones serían muy ligeramente alivianadas. la entente se podía quedar tranquila con que alemania cobrará las reparaciones sería técnicamente suficiente sin embargo las relaciones con francia serían a partir de aquí de hostilidad perpetua y las de reino unido, de tensión profunda.\n"
historia_del_estado_aleman.3.a:0 "quiero volver atrás"
historia_del_estado_aleman.3.b:0 "interesante"
historia_del_estado_aleman.4.t:0 "LOS NO TAN FELICES AÑOS 20"
historia_del_estado_aleman.4.d:0 "en el caso particular de alemania, los años 20 no tuvieron nada de feliz, puesto que la crisis por tratar de ver cómo pagar exactamente la deuda provocó que se generará una inflación enorme que solamente se pudo ser contenida debido al trato que el estado alemán hizo a regañadientes con los estadounidenses, sin embargo a pesar que la bonanza económica de la época pudo hacer que la economía del estado prosperará un poco, esa bonanza nunca se vio reflejada en la población, puesto que en secreto alemania empezó a dedicar todos sus esfuerzos en fabricar armas para esperar el momento y un dia vengarse, sin embargo eso no evitó que su industria se terminará estancando así como gran parte de sus genios que terminaron yéndose del estado debido a su elitismo.\n\nesto fue así hasta la crisis del 29 donde la bonanza económica terminó y la economía del estado que ya era mediocre no hizo más que ir para abajo, la gente ya harta del gobierno empezó a marchar por las calles al principio eran protestas pro democráticas, pero rápidamente se convirtieron en revueltas comunistas, ante esto el gobierno desesperado no se le ocurrió otra idea mejor que declarar ley marcial y mandar a los freikorps a suprimir todo tipo de protesta con bala si es necesario, sorprendemente funcionando pero con un costo y confianza en el gobierno exageradamente poco favorables, \n\nde alguna manera milagrosa el gobierno ha logrado mantenerse a la cabeza con kapp pero todo parece apuntar que esta en ocaso y que de no haber cambios pronto, quedara como el último grito agónico de una era que terminó hace décadas…\n"
historia_del_estado_aleman.4.a:0 "quiero volver atras"
historia_del_estado_aleman.4.b:0 "POR EL REICH"
historia_del_estado_aleman.5.t:0 "the knight of reaction"
historia_del_estado_aleman.5.d:0 "Someone enters the room to tell Ludendorf, a member of the military junta, that Alfred Hugenberg is preparing a reformist candidacy, sensing that Lutwitz's regime is about to end due to his old age and the state of the nation. He enters and is surprised to hear Beethoven playing and the sound of a wine glass being poured. He sees Ludendorf in his most flamboyant and understated military uniform, stuffing himself with ribs and roast potatoes. The man is taken aback and says, "Hello." "What brings you here?" Ludendorf asks in a disagreeable tone. The man begins to explain in a convoluted way, given the disgusting sight of Ludendorf eating. However, when he mentions the reformist faction's candidacy, Hugenberg falls silent and begins to speak in an arrogant manner. \n\"So the bastard is really going to do it..." he says in a contemptuous tone. "That bookworm thinks he's the best alternative for Germany, that we need 'change,' that our regime is unsustainable..." “Well, I’ll tell that hypocrite who years ago was badmouthing the republic that this is sustainable and all it takes is a firmer hand, it’s that simple.” At this point, the informant didn’t know whether to leave (which would surely be seen as disrespectful to someone like him) or stay and listen to the speech of someone clearly stuck in the 19th century.\n\ “The worst part… is that they don’t know how to love Germany the way I do. They only want things like ‘the language,’ ‘the food,’ ‘brotherhood,’ but I say no, the real Germany is made up of soldiers, farmers, and true intellectuals, not those pathetic social democrats or like Hugenberg himself. You really don’t know how sick all this-” Just as he was about to finish the sentence, he realized the messenger was gone and he was talking to himself."
historia_del_estado_aleman.5.a:0 ""It seems I'll have a lot to teach them when I take power.""
